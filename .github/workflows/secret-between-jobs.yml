name: Secret Between Jobs

on: [workflow_dispatch, push]

jobs:
  generate-secret:
    runs-on: ubuntu-latest
    outputs:
      secret: ${{ steps.gen.outputs.secret }}
    steps:
      - name: Generate secret value
        id: gen
        run: |
          SECRET=$(openssl rand -hex 16)
          # Mask it — the runner redacts every subsequent occurrence in logs
          # Write to GITHUB_OUTPUT; the value is already masked at this point
          echo "secret=$SECRET" >> "$GITHUB_OUTPUT"
          #echo "::add-mask::$SECRET"

  use-secret:
    runs-on: ubuntu-latest
    needs: generate-secret
    # Inject the job output as an environment variable for the entire job
    env:
      MY_SECRET: ${{ needs.generate-secret.outputs.secret }}
    steps:
      # Each job runs on a fresh runner, so masking must be re-applied here
      - name: Re-mask secret on this runner
        run: echo "::add-mask::$MY_SECRET"

      - name: Use the secret
        run: |
          echo "Secret is available as MY_SECRET env var."
          echo "Length: ${#MY_SECRET}"
          echo "Value (should be masked): $MY_SECRET"
